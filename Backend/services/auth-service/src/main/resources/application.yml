spring:
  config:
    import: optional:file:.env[.properties],optional:file:./Backend/services/auth-service/.env[.properties]
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/eventzen_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:${DB_USER:root}}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    access-token-minutes: ${APP_SECURITY_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_SECURITY_REFRESH_TOKEN_DAYS:7}
    reset-otp-minutes: ${APP_SECURITY_RESET_OTP_MINUTES:10}
    cookie-secure: ${APP_SECURITY_COOKIE_SECURE:false}
    allowed-origins: ${ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}}
    jwt-private-key: ${JWT_PRIVATE_KEY:}
    jwt-public-key: ${JWT_PUBLIC_KEY:}
